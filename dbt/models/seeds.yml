# High-level logic:
# Documents geography lookup models derived from seed data.

version: 2

models:
  - name: categories
    description: Categories lookup model built from seed data
    columns:
      - name: CategoryID
        description: Unique category identifier
        data_type: int64
      - name: CategoryName
        description: Name of the product category
        data_type: string

  - name: cities
    description: Cities lookup model built from seed data
    columns:
      - name: CityID
        description: Unique city identifier
        data_type: int64
      - name: CityName
        description: Name of the city
        data_type: string
      - name: Zipcode
        description: Postal code of the city
        data_type: string
      - name: CountryID
        description: Foreign key to countries model
        data_type: int64

  - name: countries
    description: Countries lookup model built from seed data
    columns:
      - name: CountryID
        description: Unique country identifier
        data_type: int64
      - name: CountryName
        description: Name of the country
        data_type: string
      - name: CountryCode
        description: ISO country code
        data_type: string