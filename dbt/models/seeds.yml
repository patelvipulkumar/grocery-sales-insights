# High-level logic:
# Documents seed data models loaded from CSV files in dbt/data/
# Seeds are converted to tables in the raw schema and available for reference in dbt models.

version: 2

seeds:
  - name: categories
    description: Product categories seed data
    columns:
      - name: CategoryID
        description: Unique category identifier
        data_type: int64
      - name: CategoryName
        description: Name of the product category
        data_type: string

  - name: cities
    description: City lookup seed data
    columns:
      - name: CityID
        description: Unique city identifier
        data_type: int64
      - name: CityName
        description: Name of the city
        data_type: string
      - name: Zipcode
        description: Postal code of the city
        data_type: string
      - name: CountryID
        description: Foreign key to countries seed
        data_type: int64

  - name: countries
    description: Country lookup seed data
    columns:
      - name: CountryID
        description: Unique country identifier
        data_type: int64
      - name: CountryName
        description: Name of the country
        data_type: string
      - name: CountryCode
        description: ISO country code
        data_type: string
