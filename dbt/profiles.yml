# High-level logic:
# Defines dbt runtime connection profile for BigQuery execution,
# including authentication method, target dataset, and execution settings.

grocery_gcp:
  target: dev
  outputs:
    dev:
      type: bigquery
      method: service-account
      project: "{{ env_var('GCP_PROJECT', 'ci-placeholder') }}"
      keyfile: "{{ env_var('GOOGLE_APPLICATION_CREDENTIALS', '/dev/null') }}"
      dataset: grocery_raw
      location: US
      threads: 4
      timeout_seconds: 300
