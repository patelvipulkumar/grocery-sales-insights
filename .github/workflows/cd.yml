name: CD

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    environment: production

    steps:
    - uses: actions/checkout@v4

    - name: Set up Google Cloud SDK
      uses: google-github-actions/setup-gcloud@v1
      with:
        project_id: ${{ secrets.GCP_PROJECT_ID }}
        service_account_key: ${{ secrets.GCP_SA_KEY }}
        export_default_credentials: true

    - name: Authenticate Docker to GCR
      run: |
        echo ${{ secrets.GCP_SA_KEY }} > /tmp/gcp-key.json
        gcloud auth activate-service-account --key-file=/tmp/gcp-key.json
        gcloud auth configure-docker

    - name: Terraform Init and Apply
      working-directory: terraform
      run: |
        terraform init
        terraform plan -out=tfplan
        terraform apply -auto-approve tfplan

    - name: Build and push Docker images
      run: |
        docker build -t gcr.io/${{ secrets.GCP_PROJECT_ID }}/grocery-airflow:latest -f airflow/Dockerfile .
        docker push gcr.io/${{ secrets.GCP_PROJECT_ID }}/grocery-airflow:latest

    - name: Deploy (GCE or GKE placeholder)
      run: |
        echo "Deploy step: update VM/container to use latest image or redeploy service."
        # Add project-specific deployment commands here (e.g., gcloud compute instances update-container, gcloud run deploy, etc.)
