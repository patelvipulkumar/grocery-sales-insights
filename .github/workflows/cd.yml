# High-level logic:
# Deploys infrastructure and application artifacts by validating secrets,
# building/pushing container images, and applying Terraform changes.

name: CD

# Uncomment to enable CD on main branch push after end-to-end testing complete
#on:
#  push:
#    branches: [main]

on:
  workflow_dispatch:  # Manual trigger only

jobs:
  deploy:
    runs-on: ubuntu-latest

    environment: production

    steps:
    - uses: actions/checkout@v4

    - name: Validate required secrets
      run: |
        missing=0
        if [ -z "${{ secrets.GCP_PROJECT_ID }}" ]; then
          echo "Missing required secret: GCP_PROJECT_ID"
          missing=1
        fi
        if [ -z "${{ secrets.GCP_SA_KEY }}" ]; then
          echo "Missing required secret: GCP_SA_KEY"
          missing=1
        fi
        if [ -z "${{ secrets.DOCKERHUB_USERNAME }}" ]; then
          echo "Missing required secret: DOCKERHUB_USERNAME"
          missing=1
        fi
        if [ -z "${{ secrets.DOCKERHUB_TOKEN }}" ]; then
          echo "Missing required secret: DOCKERHUB_TOKEN"
          missing=1
        fi
        if [ "$missing" -ne 0 ]; then
          echo "One or more required secrets are missing. See GITHUB_SECRETS_SETUP.md"
          exit 1
        fi

    - name: Resolve image repository
      run: |
        IMAGE_REPO="${{ secrets.DOCKER_IMAGE_REPOSITORY }}"
        if [ -z "$IMAGE_REPO" ]; then
          IMAGE_REPO="patelvipulkumar/grocerysalesendtoend"
          echo "Using default image repository: $IMAGE_REPO"
          echo "Set DOCKER_IMAGE_REPOSITORY secret to override this for your own fork/repo."
        else
          echo "Using configured image repository: $IMAGE_REPO"
        fi
        echo "DOCKER_IMAGE=$IMAGE_REPO" >> "$GITHUB_ENV"

    - name: Set up Google Cloud SDK
      uses: google-github-actions/setup-gcloud@v1
      with:
        project_id: ${{ secrets.GCP_PROJECT_ID }}
        service_account_key: ${{ secrets.GCP_SA_KEY }}
        export_default_credentials: true

    - name: Authenticate to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Terraform Init and Apply
      working-directory: terraform
      run: |
        terraform init
        terraform plan -out=tfplan
        terraform apply -auto-approve tfplan

    - name: Build and push Docker images
      run: |
        docker build -t $DOCKER_IMAGE:latest -t $DOCKER_IMAGE:${{ github.sha }} -f airflow/Dockerfile .
        docker push $DOCKER_IMAGE:latest
        docker push $DOCKER_IMAGE:${{ github.sha }}

    - name: Deploy (GCE or GKE placeholder)
      run: |
        echo "Deploy step: update VM/container to use latest image or redeploy service."
        # Add project-specific deployment commands here (e.g., gcloud compute instances update-container, gcloud run deploy, etc.)
