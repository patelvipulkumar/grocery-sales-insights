# High-level logic:
# Deploys infrastructure and application artifacts by validating secrets,
# building/pushing container images, and applying Terraform changes.

name: CD

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch'

    permissions:
      contents: read

    environment: production

    steps:
    - uses: actions/checkout@v4

    - name: Validate required secrets
      run: |
        missing=0
        if [ -z "${{ secrets.GCP_PROJECT_ID }}" ]; then
          echo "Missing required secret: GCP_PROJECT_ID"
          missing=1
        fi
        if [ -z "${{ secrets.GCP_SA_KEY }}" ]; then
          echo "Missing required secret: GCP_SA_KEY"
          missing=1
        fi
        if [ -z "${{ secrets.GCP_REGION }}" ]; then
          echo "Missing required secret: GCP_REGION"
          missing=1
        fi
        if [ -z "${{ secrets.DOCKERHUB_USERNAME }}" ]; then
          echo "Missing required secret: DOCKERHUB_USERNAME"
          missing=1
        fi
        if [ -z "${{ secrets.DOCKERHUB_TOKEN }}" ]; then
          echo "Missing required secret: DOCKERHUB_TOKEN"
          missing=1
        fi
        if [ -z "${{ secrets.KAGGLE_API_TOKEN }}" ]; then
          echo "Missing required secret: KAGGLE_API_TOKEN"
          missing=1
        fi
        if [ -z "${{ secrets.LOOKER_STUDIO_REPORT_ID }}" ]; then
          echo "Missing required secret: LOOKER_STUDIO_REPORT_ID"
          missing=1
        fi
        if [ -z "${{ secrets.AIRFLOW_DB_PASSWORD }}" ]; then
          echo "Missing required secret: AIRFLOW_DB_PASSWORD"
          missing=1
        fi
        if [ "$missing" -ne 0 ]; then
          echo "One or more required secrets are missing. See GITHUB_SECRETS_SETUP.md"
          exit 1
        fi

    - name: Write GCP credentials file
      run: |
        echo '${{ secrets.GCP_SA_KEY }}' > /tmp/gcp-key.json
        echo "GOOGLE_APPLICATION_CREDENTIALS=/tmp/gcp-key.json" >> "$GITHUB_ENV"

    - name: Resolve image repository
      run: |
        IMAGE_REPO="${{ secrets.DOCKER_IMAGE_REPOSITORY }}"
        if [ -z "$IMAGE_REPO" ]; then
          IMAGE_REPO="patelvipulkumar/grocerysalesendtoend"
          echo "Using default image repository: $IMAGE_REPO"
          echo "Set DOCKER_IMAGE_REPOSITORY secret to override this for your own fork/repo."
        else
          echo "Using configured image repository: $IMAGE_REPO"
        fi
        echo "DOCKER_IMAGE=$IMAGE_REPO" >> "$GITHUB_ENV"

    - name: Authenticate to Google Cloud
      uses: google-github-actions/auth@v2
      with:
        credentials_json: ${{ secrets.GCP_SA_KEY }}

    - name: Set up Google Cloud SDK
      uses: google-github-actions/setup-gcloud@v3
      with:
        project_id: ${{ secrets.GCP_PROJECT_ID }}

    - name: Install Terraform
      run: |
        curl -fsSL https://apt.releases.hashicorp.com/gpg | sudo gpg --dearmor -o /usr/share/keyrings/hashicorp-archive-keyring.gpg
        echo "deb [signed-by=/usr/share/keyrings/hashicorp-archive-keyring.gpg] https://apt.releases.hashicorp.com $(lsb_release -cs) main" | sudo tee /etc/apt/sources.list.d/hashicorp.list
        sudo apt-get update && sudo apt-get install -y terraform

    - name: Terraform Init and Apply
      working-directory: terraform
      env:
        TF_VAR_credentials: /tmp/gcp-key.json
        TF_VAR_project_id: ${{ secrets.GCP_PROJECT_ID }}
        TF_VAR_region: ${{ secrets.GCP_REGION }}
        TF_VAR_kaggle_api_token: ${{ secrets.KAGGLE_API_TOKEN }}
        TF_VAR_looker_studio_report_id: ${{ secrets.LOOKER_STUDIO_REPORT_ID }}
        TF_VAR_airflow_db_password: ${{ secrets.AIRFLOW_DB_PASSWORD }}
      run: |
        terraform init

        PROJECT_ID="${{ secrets.GCP_PROJECT_ID }}"

        import_if_exists() {
          local address="$1"
          local import_id="$2"

          if terraform state show "$address" > /dev/null 2>&1; then
            echo "State already contains $address"
            return 0
          fi

          echo "Attempting import: $address"
          if terraform import "$address" "$import_id" > /dev/null 2>&1; then
            echo "Imported $address"
          else
            echo "No import for $address (resource may not exist yet); continuing"
          fi
        }

        import_if_exists \
          "google_service_account.airflow" \
          "projects/${PROJECT_ID}/serviceAccounts/airflow-sa@${PROJECT_ID}.iam.gserviceaccount.com"

        import_if_exists "google_storage_bucket.raw_bucket" "grocery-raw"

        import_if_exists \
          "google_bigquery_dataset.raw" \
          "projects/${PROJECT_ID}/datasets/grocery_raw"
        import_if_exists \
          "google_bigquery_dataset.analytics" \
          "projects/${PROJECT_ID}/datasets/grocery_analytics"
        import_if_exists \
          "google_bigquery_dataset.staging" \
          "projects/${PROJECT_ID}/datasets/grocery_staging"

        import_if_exists \
          "google_secret_manager_secret.kaggle_api" \
          "projects/${PROJECT_ID}/secrets/kaggle-api-token"
        import_if_exists \
          "google_secret_manager_secret.looker_studio_report_id" \
          "projects/${PROJECT_ID}/secrets/looker-studio-report-id"
        import_if_exists \
          "google_secret_manager_secret.airflow_db_password" \
          "projects/${PROJECT_ID}/secrets/airflow-db-password"

        terraform plan -out=tfplan
        terraform apply -auto-approve tfplan

    - name: Authenticate to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Build and push Docker images
      run: |
        docker build -t $DOCKER_IMAGE:latest -t $DOCKER_IMAGE:${{ github.sha }} -f airflow/Dockerfile airflow
        docker push $DOCKER_IMAGE:latest
        docker push $DOCKER_IMAGE:${{ github.sha }}

    - name: Deploy
      env:
        GCE_INSTANCE: ${{ secrets.GCE_INSTANCE_NAME }}
        GCE_ZONE: ${{ secrets.GCE_ZONE }}
      run: |
        echo "=== Terraform Provisioned Resources ==="
        cd terraform && terraform output && cd ..

        echo ""
        echo "=== Docker Image Published ==="
        echo "Image: $DOCKER_IMAGE:latest"
        echo "SHA:   $DOCKER_IMAGE:${{ github.sha }}"

        if [ -n "$GCE_INSTANCE" ] && [ -n "$GCE_ZONE" ]; then
          APP_DIR="\$HOME/grocery-sales-insights"
          echo ""
          echo "=== Deploying to GCE instance: $GCE_INSTANCE (zone: $GCE_ZONE, app dir: $APP_DIR) ==="
          gcloud compute ssh "$GCE_INSTANCE" --zone="$GCE_ZONE" --quiet --command="
            set -e && \
            TARGET_DIR=\"\$HOME/grocery-sales-insights\" && \
            mkdir -p \"\$TARGET_DIR\" && \
            if [ -d \"\$TARGET_DIR/gcp-key.json\" ]; then rm -rf \"\$TARGET_DIR/gcp-key.json\"; fi && \
            if [ ! -d \"\$TARGET_DIR/.git\" ]; then \
              if [ -n \"\$(ls -A \"\$TARGET_DIR\" 2>/dev/null)\" ]; then rm -rf \"\$TARGET_DIR\"; fi && \
              git clone https://github.com/${{ github.repository }}.git \"\$TARGET_DIR\"; \
            fi && \
            cd \"\$TARGET_DIR\" && \
            git pull --ff-only
          "
          gcloud compute scp /tmp/gcp-key.json "$GCE_INSTANCE":~/grocery-sales-insights/gcp-key.json --zone="$GCE_ZONE" --quiet
          gcloud compute ssh "$GCE_INSTANCE" --zone="$GCE_ZONE" --quiet --command="
            set -e && \
            TARGET_DIR=\"\$HOME/grocery-sales-insights\" && \
            mkdir -p \"\$TARGET_DIR\" && \
            cd \"\$TARGET_DIR\" && \
            mkdir -p spark-events && \
            sudo -n chmod 777 spark-events && \
            if [ ! -f gcp-key.json ]; then \
              echo 'ERROR: gcp-key.json was not copied to the VM as a file.'; \
              exit 1; \
            fi && \
            chmod 600 gcp-key.json && \
            if ! sudo -n true > /dev/null 2>&1; then \
              echo 'ERROR: Remote user requires passwordless sudo for automated deploy.'; \
              echo 'Grant NOPASSWD sudo or add the user to docker group and update workflow.'; \
              exit 1; \
            fi && \
            if ! sudo -n docker info > /dev/null 2>&1; then \
              echo 'ERROR: Docker daemon is not accessible via sudo on the VM.'; \
              echo 'Ensure Docker is installed, running, and allowed for sudo on this host.'; \
              exit 1; \
            fi && \
            if command -v docker-compose > /dev/null 2>&1; then \
              DOCKER_IMAGE_REPOSITORY=$DOCKER_IMAGE AIRFLOW_IMAGE_TAG=${{ github.sha }} sudo -n docker-compose -f docker-compose.yml pull && \
              DOCKER_IMAGE_REPOSITORY=$DOCKER_IMAGE AIRFLOW_IMAGE_TAG=${{ github.sha }} sudo -n docker-compose -f docker-compose.yml up -d; \
            else \
              DOCKER_IMAGE_REPOSITORY=$DOCKER_IMAGE AIRFLOW_IMAGE_TAG=${{ github.sha }} sudo -n docker compose -f docker-compose.yml pull && \
              DOCKER_IMAGE_REPOSITORY=$DOCKER_IMAGE AIRFLOW_IMAGE_TAG=${{ github.sha }} sudo -n docker compose -f docker-compose.yml up -d; \
            fi
          "
          echo "Deployment complete."
        else
          echo ""
          echo "=== Automated GCE deployment skipped (no GCE_INSTANCE_NAME / GCE_ZONE secrets set) ==="
          echo "To deploy Airflow manually on your target machine, run:"
          echo "  DOCKER_IMAGE_REPOSITORY=$DOCKER_IMAGE AIRFLOW_IMAGE_TAG=${{ github.sha }} sudo docker-compose -f docker-compose.yml pull"
          echo "  DOCKER_IMAGE_REPOSITORY=$DOCKER_IMAGE AIRFLOW_IMAGE_TAG=${{ github.sha }} sudo docker-compose -f docker-compose.yml up -d"
          echo ""
          echo "To enable automated GCE deployment, add these optional secrets:"
          echo "  GCE_INSTANCE_NAME: your GCE VM instance name"
          echo "  GCE_ZONE:          your GCE zone (e.g. us-west1-a)"
        fi
